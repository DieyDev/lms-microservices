name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔥 AUTH
      - name: Build and push AuthService
        uses: docker/build-push-action@v5
        with:
          context: ./IntelligentLMS/src/Services/Auth/IntelligentLMS.Auth
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/intelligentlms-auth:latest

      # 🔥 USER
      - name: Build and push UserService
        uses: docker/build-push-action@v5
        with:
          context: ./IntelligentLMS/src/Services/User/IntelligentLMS.User
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/intelligentlms-user:latest

      # 🔥 COURSE
      - name: Build and push CourseService
        uses: docker/build-push-action@v5
        with:
          context: ./IntelligentLMS/src/Services/Course/IntelligentLMS.Course
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/intelligentlms-course:latest

      # 🔥 PROGRESS
      - name: Build and push ProgressService
        uses: docker/build-push-action@v5
        with:
          context: ./IntelligentLMS/src/Services/Progress/IntelligentLMS.Progress
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/intelligentlms-progress:latest

      # 🔥 ANALYTICS
      - name: Build and push AnalyticsService
        uses: docker/build-push-action@v5
        with:
          context: ./IntelligentLMS/src/Services/Analytics/IntelligentLMS.Analytics
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/intelligentlms-analytics:latest

      # 🔥 GATEWAY
      - name: Build and push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./IntelligentLMS/src/Gateway/IntelligentLMS.Gateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/intelligentlms-gateway:latest

      # 🔥 AI SERVICE
      - name: Build and push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./IntelligentLMS/src/Services/AI
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/intelligentlms-ai:latest